name: CI/CD

# Déclenchement à chaque push ou pull request sur master
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ─── Validation de la configuration Docker Compose ───────────────────────────
  # Le repo principal contient docker-compose.yml, nginx/ et monitoring/.
  # Les tests backend et frontend sont dans leurs propres repos (backend/, mobile-web/).
  # Ce job vérifie que la config docker-compose est valide avec les vraies variables.
  docker-compose-check:
    name: Validation docker-compose (CD)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      # Vérifie que docker-compose.yml est syntaxiquement valide et que toutes
      # les variables d'environnement requises sont bien définies.
      # Les credentials viennent des secrets du repo GitHub (Settings → Secrets).
      - name: Valider la config docker-compose
        run: docker compose config
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
